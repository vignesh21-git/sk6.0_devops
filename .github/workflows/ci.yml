name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Lint · Test · Scan
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sk6_test
          POSTGRES_USER: sk6
          POSTGRES_PASSWORD: testpassword
        options: >-
          --health-cmd "pg_isready -U sk6 -d sk6_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql+asyncpg://sk6:testpassword@localhost:5432/sk6_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key-not-for-production
      ENVIRONMENT: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt

      - name: Lint — ruff
        run: ruff check backend/app/

      - name: Type check — mypy
        run: mypy backend/app/ --ignore-missing-imports

      - name: Unit tests
        run: |
          cd backend
          pytest tests/unit -v --tb=short

      - name: Integration tests
        run: |
          cd backend
          pytest tests/integration -v --tb=short --cov=app --cov-report=xml --cov-report=term-missing

      - name: Security — bandit
        run: bandit -r backend/app/ -ll -q

      - name: Security — safety
        run: safety check -r backend/requirements.txt --bare
        continue-on-error: true   # advisory only — review output manually

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: backend/coverage.xml
          fail_ci_if_error: false
